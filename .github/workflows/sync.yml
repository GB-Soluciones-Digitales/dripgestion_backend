name: Sync con GB Soluciones

on:
  push:
    branches: [ "main" ]

jobs:
  sync-to-agency:
    runs-on: ubuntu-latest
    needs: [test-and-deploy] 
    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push al repositorio de la agencia
        env:
          DEST_TOKEN: ${{ secrets.GB_SYNC_TOKEN }} 
          DEST_REPO: "github.com/GBSolucionesDigitales/dripgestion_backend.git" 
        run: |
          git remote add gb-soluciones https://oauth2:${DEST_TOKEN}@${DEST_REPO}
          git push gb-soluciones main --force